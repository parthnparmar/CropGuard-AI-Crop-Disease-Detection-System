{% extends "base.html" %}
{% block title %}Profile - CropGuard AI{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white py-3">
                    <h5 class="fw-bold mb-0"><i class="fas fa-user-circle me-2"></i>My Profile</h5>
                </div>
                <div class="card-body p-4">
                    <div id="profile-alert"></div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" value="{{ user.username }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" value="{{ user.email }}" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phone</label>
                            <input type="tel" id="phone" class="form-control" value="{{ user.phone or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Role</label>
                            <input type="text" class="form-control" value="{{ user.role.capitalize() }}" disabled>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Farm Address</label>
                            <textarea id="address" class="form-control" rows="2">{{ user.address or '' }}</textarea>
                        </div>
                    </div>
                    <hr class="my-4">
                    <h6 class="fw-bold mb-3">Change Password</h6>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Current Password</label>
                            <input type="password" id="current-password" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">New Password</label>
                            <input type="password" id="new-password" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Confirm New Password</label>
                            <input type="password" id="confirm-password" class="form-control">
                        </div>
                    </div>
                    <div class="mt-4">
                        <button onclick="updateProfile()" class="btn btn-success px-4 fw-semibold">
                            <i class="fas fa-save me-2"></i>Save Changes
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function updateProfile() {
    const newPwd = document.getElementById('new-password').value;
    const confirmPwd = document.getElementById('confirm-password').value;
    if (newPwd && newPwd !== confirmPwd) {
        showAlert('Passwords do not match.', 'danger');
        return;
    }
    const body = {
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value,
        current_password: document.getElementById('current-password').value,
        new_password: newPwd
    };
    const res = await fetch('/profile', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    showAlert(data.message, data.success ? 'success' : 'danger');
}
function showAlert(msg, type) {
    document.getElementById('profile-alert').innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
}
</script>
{% endblock %}
